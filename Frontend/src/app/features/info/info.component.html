<app-header></app-header>
<div class="info-container">

  @if (errorMessage) {
    <p class="error-text">{{ errorMessage }}</p>
  }

  @if (isLoading) {
    <p class="loading-text">Betöltés...</p>
  } @else if (infoBlocks.length === 0) {
    <p class="empty-text">Jelenleg nincs megjeleníthető információ.</p>
  } @else {
    @for (block of infoBlocks; track block.id) {
      <section class="info-section">
        <h2>{{ block.title }}</h2>
        <div class="info-content" [innerHTML]="block.safeContent"></div>
      </section>
    }
  }

</div>
