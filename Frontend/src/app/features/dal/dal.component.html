<app-header></app-header>
<div class="dal-container">

  @if (errorMessage) {
    <p class="error-text">{{ errorMessage }}</p>
  }

  @if (isLoading) {
    <p class="loading-text">Betöltés...</p>
  } @else if (songs.length === 0) {
    <p class="empty-text">Még nincsenek feltöltött dalok.</p>
  } @else {
    @for (song of songs; track song.id; let i = $index) {
      <section class="dal-section">
        <h2><span class="song-number">{{ i + 1 }}.</span> {{ song.title }}</h2>
        <div class="song-content" [innerHTML]="song.safeContent"></div>
      </section>
    }
  }

</div>
